# Build and deploy the Vite app to GitHub Pages.
# After the first run: Repo → Settings → Pages → Source: GitHub Actions.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install
        run: npm ci
      # Force BASE_PATH in the same shell as Vite (fixes 404 on /assets/ without /repo/).
      - name: Build
        run: |
          REPO=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')
          export BASE_PATH="/${REPO}/"
          echo "BASE_PATH=$BASE_PATH"
          npm run build
      - name: Verify GitHub Pages base path in index.html
        run: |
          NAME=$(echo '${{ github.repository }}' | cut -d/ -f2 | tr '[:upper:]' '[:lower:]')
          test -f dist/index.html
          grep -q "/${NAME}/assets/" dist/index.html || { echo "dist/index.html must reference /${NAME}/assets/ — check vite.config.js resolveBase()"; cat dist/index.html; exit 1; }
          echo "OK: assets use base /${NAME}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
